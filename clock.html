<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>clock</title>

<link rel="icon" href="favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#00e5ff;
  --bg1:#0f2027;
  --bg2:#203a43;
  --bg3:#2c5364;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  color:white;
  font-family:'Orbitron',sans-serif;
  overflow:hidden;
}

/* 上 */
.top{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.clock{
  font-size:90px;
  letter-spacing:4px;
  text-shadow:0 0 15px var(--accent);
}

.today-card{
  margin-top:10px;
  padding:12px 20px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(6px);
  font-size:14px;
}

/* 下 */
.bottom{
  height:40%;
  padding:10px;
}

#weather{
  display:flex;
  gap:12px;
  overflow-x:auto;
}

.weather-day{
  min-width:110px;
  background:rgba(0,0,0,0.4);
  border-radius:12px;
  padding:10px;
  text-align:center;
  font-size:13px;
  transition:0.2s;
}

.weather-day:hover{
  transform:translateY(-3px);
}

/* カレンダー */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  flex-direction:column;
  padding:20px;
}

.year{
  font-size:50px;
  margin-bottom:10px;
}

.header{
  display:flex;
  gap:10px;
  align-items:center;
}

.header button{
  background:none;
  border:1px solid var(--accent);
  color:var(--accent);
  padding:4px 10px;
  cursor:pointer;
}

#calendarGrid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}

.day{
  padding:6px;
  border-radius:8px;
  background:rgba(255,255,255,0.05);
  cursor:pointer;
  font-size:12px;
}

.day.today{
  outline:2px solid var(--accent);
}

.day.has-event{
  background:rgba(0,229,255,0.2);
}

/* イベント */
.eventModal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.7);
}

.eventBox{
  background:#111;
  padding:15px;
  border-radius:10px;
  width:260px;
}

input{
  width:100%;
  margin-top:5px;
  padding:5px;
  background:#222;
  border:none;
  color:white;
}

.eventItem{
  margin-top:5px;
  padding:4px;
  border-bottom:1px solid #333;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="top" id="clockArea">
  <div class="clock" id="clock"></div>
  <div class="today-card" id="todayCard"></div>
</div>

<div class="bottom">
  <div id="weather"></div>
</div>

<!-- カレンダー -->
<div id="calendarModal" class="modal">
  <div class="year" id="year"></div>

  <div class="header">
    <button onclick="changeMonth(-1)">◀</button>
    <span id="month"></span>
    <button onclick="changeMonth(1)">▶</button>
    <button onclick="goNow()">今月</button>
  </div>

  <div id="calendarGrid"></div>
</div>

<!-- 予定 -->
<div id="eventModal" class="eventModal">
  <div class="eventBox">
    <h3 id="eventDate"></h3>
    <input id="eventInput" placeholder="予定">
    <input id="eventTime" type="time">
    <button onclick="addEvent()">追加</button>
    <div id="eventList"></div>
    <button onclick="closeEvent()">閉じる</button>
  </div>
</div>

<script>
// 時計
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString();
},1000);

// 天気
let weatherData=null;
async function loadWeather(){
  const url="https://api.open-meteo.com/v1/forecast?latitude=34.69&longitude=135.50&daily=temperature_2m_max,temperature_2m_min&current_weather=true";
  const res=await fetch(url);
  weatherData=await res.json();

  const d=new Date(weatherData.daily.time[0]);
  document.getElementById("todayCard").innerHTML =
    `${d.getMonth()+1}/${d.getDate()} |
     ${weatherData.daily.temperature_2m_max[0]}℃ /
     ${weatherData.daily.temperature_2m_min[0]}℃ |
     現在 ${weatherData.current_weather.temperature}℃`;

  const w=document.getElementById("weather");
  w.innerHTML="";
  for(let i=1;i<weatherData.daily.time.length;i++){
    const dd=new Date(weatherData.daily.time[i]);
    const div=document.createElement("div");
    div.className="weather-day";
    div.innerHTML=
      `${dd.getMonth()+1}/${dd.getDate()}<br>
       ${weatherData.daily.temperature_2m_max[i]} / ${weatherData.daily.temperature_2m_min[i]}`;
    w.appendChild(div);
  }
}
loadWeather();

// カレンダー
let currentMonth=new Date();

document.getElementById("clockArea").onclick=()=>{
  document.getElementById("calendarModal").style.display="flex";
  renderCalendar();
};

function changeMonth(n){
  currentMonth.setMonth(currentMonth.getMonth()+n);
  renderCalendar();
}

function goNow(){
  currentMonth=new Date();
  renderCalendar();
}

function renderCalendar(){
  const grid=document.getElementById("calendarGrid");
  grid.innerHTML="";

  const y=currentMonth.getFullYear();
  const m=currentMonth.getMonth();

  document.getElementById("year").innerText=y;
  document.getElementById("month").innerText=(m+1)+"月";

  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++){
    grid.appendChild(document.createElement("div"));
  }

  for(let d=1;d<=last;d++){
    const date=new Date(y,m,d);
    const dateStr=date.toISOString().split("T")[0];

    const div=document.createElement("div");
    div.className="day";

    if(events[dateStr]) div.classList.add("has-event");

    if(date.toDateString()===new Date().toDateString()){
      div.classList.add("today");
    }

    div.innerText=d;
    div.onclick=()=>openEvent(dateStr);

    grid.appendChild(div);
  }
}

// 予定
let events=JSON.parse(localStorage.getItem("events")||"{}");
let selectedDate="";

function openEvent(date){
  selectedDate=date;
  document.getElementById("eventModal").style.display="flex";
  document.getElementById("eventDate").innerText=date;
  renderEvents();
}

function closeEvent(){
  document.getElementById("eventModal").style.display="none";
}

function addEvent(){
  const text=document.getElementById("eventInput").value;
  const time=document.getElementById("eventTime").value;

  if(!events[selectedDate]) events[selectedDate]=[];
  events[selectedDate].push({text,time});

  localStorage.setItem("events",JSON.stringify(events));
  renderEvents();
}

function renderEvents(){
  const list=document.getElementById("eventList");
  list.innerHTML="";

  (events[selectedDate]||[]).forEach((e,i)=>{
    const div=document.createElement("div");
    div.className="eventItem";
    div.innerText=(e.time||"--:--")+" "+e.text;

    div.onclick=()=>{
      events[selectedDate].splice(i,1);
      localStorage.setItem("events",JSON.stringify(events));
      renderEvents();
    };

    list.appendChild(div);
  });
}
</script>

</body>
</html>
